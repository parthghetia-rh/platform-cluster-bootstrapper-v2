apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: password
  namespace: minio-operator
  annotations:
    argocd.argoproj.io/sync-wave: "51"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  length: 10
  symbols: 0
  digits: 4
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: minio-operator
  annotations:
    argocd.argoproj.io/sync-wave: "53"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: "1h"
  target:
    name: minio-credentials
    template:
      engineVersion: v2
      data:
        # Static username
        MINIO_ROOT_USER: "minioadmin"
        # Reference the key produced by the generator below
        MINIO_ROOT_PASSWORD: "{{ .generated_pw }}"
  # Use dataFrom for Generators, NOT spec.data
  dataFrom:
  - sourceRef:
      generatorRef:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        name: password
    # This renames the generator's output so the template can find it
    rewrite:
    - regexp:
        source: "password"
        target: "generated_pw"