kind: ConfigMap
apiVersion: v1
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  name: dynamic-plugins
  labels:
    app.kubernetes.io/instance: developer-hub
    app.kubernetes.io/name: backstage
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:

      ####################################
      ## Test Something Crazy
      ####################################
      #- disabled: false
      #  package: http://npm-registry-service-verdaccio.npm-registry.svc.cluster.local:4873/@cah/backstage-plugin-slf-my-teams-dynamic/-/backstage-plugin-slf-my-teams-dynamic-1.0.4.tgz
      #  integrity: sha512-84FrbR2STQGs4qvtmDn66Obh0wKUVhidWz+eDv3ItxbX6HOIsalpMBNz1tXPc0Okie3rVtBh20SKcZK32gsNdA==

      ####################################
      ## RED HAT HTTP REQUESTS PLUGIN
      ####################################
      - disabled: false
        package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-http-request-dynamic

      ####################################
      ## RED HAT RBAC PLUGIN CONFIGURATION
      ## https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.8/html/authorization_in_red_hat_developer_hub/enabling-and-giving-access-to-rbac
      ####################################
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-rbac

      ##############################
      ## KEYCLOAK BACKEND PLUGIN
      ##############################
      - disabled: false
        package: './dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic'

    {{- if .Values.gitea.enabled }}
      ##############################
      ## GITEA PLUGIN CONFIGURATION
      ##############################
      # To get image digest, run 'skopeo inspect docker://quay.io/na-east-launch/scaffolder-backend-module-gitea:0.2.18'
      - package: oci://quay.io/na-east-launch/scaffolder-backend-module-gitea@sha256:e6ad69865b439c54d90876058db8284998789aa723c4eb39ba185a1e0f66469f!backstage-plugin-scaffolder-backend-module-gitea
        disabled: false
    {{- end }}

    {{- if .Values.gitlab.enabled }}
      ##############################
      ## GITLAB PLUGIN CONFIGURATION
      ##############################
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-gitlab-dynamic
      - disabled: false
        package: ./dynamic-plugins/dist/immobiliarelabs-backstage-plugin-gitlab-backend-dynamic
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-plugin-catalog-backend-module-gitlab-dynamic
      - disabled: false
        package: ./dynamic-plugins/dist/immobiliarelabs-backstage-plugin-gitlab
    {{- end }}

      ##################################
      ## DYNAMIC HOME PAGE PLUGIN CONFIGURATION
      ## https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.8/html/customizing_red_hat_developer_hub/customizing-the-home-page
      ##################################
      - disabled: false
        package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-dynamic-home-page

      ##############################
      ## TEKTON PLUGIN CONFIGURATION
      ##############################
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-tekton
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-tekton:
                mountPoints:
                  - mountPoint: entity.page.ci/cards
                    importName: TektonCI
                    config:
                      layout:
                        gridColumn: "1 / -1"
                      if:
                        allOf:
                          - isTektonCIAvailable

      ##################################
      ## TECH RADAR PLUGIN CONFIGURATION
      ##################################
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-tech-radar
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-tech-radar-backend-dynamic
      - disabled: false
        package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-argocd-dynamic

      ###############################
      ## ARGOCD PLUGIN CONFIGURATION
      ###############################
      - disabled: false
        package: ./dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd-backend-dynamic
      - disabled: false
        package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-argocd-dynamic
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-redhat-argocd

      ##################################
      ## KUBERNETES PLUGIN CONFIGURATION
      ##################################
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-plugin-kubernetes

      ##################################
      ## TOPOLOGY PLUGIN CONFIGURATION
      ##################################
      - disabled: false
        package: ./dynamic-plugins/dist/backstage-community-plugin-topology
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-topology:
                mountPoints:
                  - mountPoint: entity.page.topology/cards
                    importName: TopologyPage
                    config:
                      layout:
                        gridColumn: "1 / -1"
                        height: 75vh
                      if:
                        anyOf:
                          - hasAnnotation: backstage.io/kubernetes-id
                          - hasAnnotation: backstage.io/kubernetes-namespace

      ##################################
      ## NOTIFICATIONS PLUGIN CONFIGURATION
      ##################################
      - package: ./dynamic-plugins/dist/backstage-plugin-notifications
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-notifications-backend-dynamic
        disabled: false

      ##################################
      ## ANSIBLE PLUGIN CONFIGURATION
      ##################################
      # Ansible Automation
      # https://docs.redhat.com/en/documentation/red_hat_ansible_automation_platform/2.6/html/installing_ansible_plug-ins_for_red_hat_developer_hub/rhdh-install-ocp-helm_aap-plugin-rhdh-installing
      - package: 'oci://quay.io/na-east-launch/automation-portal:2.1!ansible-plugin-backstage-rhaap'
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              ansible.plugin-backstage-rhaap:
                appIcons:
                  - importName: AnsibleLogo
                    name: AnsibleLogo
                dynamicRoutes:
                  - importName: AnsiblePage
                    menuItem:
                      icon: AnsibleLogo
                      text: Ansible
                    path: /ansible
      - package: 'oci://quay.io/na-east-launch/automation-portal:2.1!ansible-plugin-scaffolder-backend-module-backstage-rhaap'
        disabled: false
        pluginConfig:
          dynamicPlugins:
            backend:
              ansible.plugin-scaffolder-backend-module-backstage-rhaap: null

